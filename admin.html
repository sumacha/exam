<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理者画面 - テスト範囲表</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div class="header-inner">
      <div class="header-title">
        <span class="icon">⚙️</span>
        管理者画面
      </div>
      <button class="menu-btn" id="backBtn" aria-label="戻る">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 12H5M12 19l-7-7 7-7"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- Admin Content -->
  <div class="admin-content active" id="adminContent">
    <main class="container">

      <!-- Version Control -->
      <div class="admin-card">
        <h3>📅 テストバージョン管理</h3>
        <div class="version-control">
          <span class="version-current" id="currentVersion">--</span>
          <select class="form-select" id="versionSelect" style="width:auto; min-width:200px;" disabled>
            <option value="">バージョンを選択</option>
          </select>
          <button class="btn btn-primary btn-sm" id="updateVersionBtn" disabled>反映</button>
          <button class="btn btn-success btn-sm" id="addVersionBtn">新規バージョン追加</button>
        </div>
      </div>

      <!-- Schedule / Timetable Editor -->
      <div class="admin-card">
        <h3>🗓 時間割・範囲エディタ</h3>
        <div class="form-group" style="margin-bottom:12px;">
          <label class="form-label" style="font-size:0.82rem;">編集するバージョンとコース</label>
          <div style="display:flex; gap:8px; flex-wrap:wrap;">
            <select class="form-select" id="editVersionSelect" style="width:auto; min-width:160px;">
              <option value="">バージョンを選択</option>
            </select>
            <select class="form-select" id="editCourseSelect" style="width:auto; min-width:160px;">
              <option value="共通">共通（選択科目用）</option>
              <option value="K/文系">K/文系</option>
              <option value="K/理系（物理）">K/理系（物理）</option>
              <option value="K/理系（生物）">K/理系（生物）</option>
              <option value="SS/理系（物理）">SS/理系（物理）</option>
              <option value="SS/理系（生物）">SS/理系（生物）</option>
            </select>
            <button class="btn btn-outline btn-sm" id="loadScheduleBtn">読み込む</button>
            <button class="btn btn-primary btn-sm" id="addEntryBtn">+ 行を追加</button>
          </div>
        </div>
        <div class="schedule-editor" id="scheduleEditor">
          <div class="empty-state" style="padding:20px;">
            <p>バージョンとコースを選択して「読み込む」を押してください</p>
          </div>
        </div>
        <div style="margin-top:12px; text-align:right;">
          <button class="btn btn-success btn-sm" id="saveScheduleBtn">変更を保存</button>
        </div>
      </div>

      <!-- Suggestions -->
      <div class="admin-card">
        <h3>💡 提案一覧</h3>
        <div class="tab-bar" id="sugTabBar">
          <button class="tab-btn active" data-filter="all">すべて</button>
          <button class="tab-btn" data-filter="test_scope">📖 範囲変更</button>
          <button class="tab-btn" data-filter="submission">📝 提出物</button>
        </div>
        <div id="suggestionList">
          <div class="empty-state">
            <div class="empty-icon">📭</div>
            <p>提案はありません</p>
          </div>
        </div>
        <div class="loading" id="sugLoading">
          <div class="spinner"></div>
          <p>読み込み中...</p>
        </div>
      </div>

    </main>
  </div>

  <script src="admin.js"></script>
</body>
</html>
