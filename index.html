<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>テスト範囲表</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div class="header-inner">
      <div class="header-title">
        <span class="icon">📋</span>
        テスト範囲表
      </div>
      <div style="display:flex; align-items:center; gap:4px;">
        <button class="menu-btn" id="printBtn" aria-label="印刷" title="印刷">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:20px;height:20px;">
            <path d="M6 9V2h12v7M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2"/>
            <path d="M6 14h12v8H6z"/>
          </svg>
        </button>
        <button class="dark-toggle-btn" id="darkModeBtn" aria-label="ダークモード切替" title="ダークモード">🌙</button>
        <button class="menu-btn" id="menuBtn" aria-label="メニューを開く">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <line x1="4" y1="6" x2="20" y2="6"/>
            <line x1="4" y1="12" x2="20" y2="12"/>
            <line x1="4" y1="18" x2="20" y2="18"/>
          </svg>
        </button>
      </div>
    </div>
  </header>

  <!-- Menu Dropdown -->
  <div class="menu-overlay" id="menuOverlay"></div>
  <div class="menu-dropdown" id="menuDropdown">
    <div class="menu-course-label" id="menuCourseLabel">現在: --</div>

    <div class="menu-section-label">セクション</div>
    <button class="menu-item" data-action="scrollTo" data-target="topSection">
      <span class="menu-icon">📋</span> トップ
    </button>
    <button class="menu-item" data-action="openTimer">
      <span class="menu-icon">⏱</span> タイマーを開く
    </button>
    <button class="menu-item" data-action="scrollTo" data-target="scheduleCard">
      <span class="menu-icon">📅</span> テスト日程
    </button>

    <div class="menu-section-label">設定</div>
    <button class="menu-item" data-action="changeCourse">
      <span class="menu-icon">🔄</span> コース変更
    </button>
    <button class="menu-item" data-action="toggleDarkMode">
      <span class="menu-icon">🌙</span> ダークモード切替
    </button>

    <div class="menu-divider"></div>
    <button class="menu-item" data-action="exportCalendar">
      <span class="menu-icon">📅</span> カレンダーに追加 (.ics)
    </button>
    <a class="menu-item" href="suggest.html">
      <span class="menu-icon">💡</span> 変更点を提案
    </a>
    <a class="menu-item" href="admin.html">
      <span class="menu-icon">⚙️</span> 管理者画面
    </a>
  </div>

  <!-- Main Content -->
  <main class="container" id="mainContent">

    <!-- Info Card (course + version) -->
    <div class="info-card" id="topSection">
      <div class="info-header">
        <div>
          <span class="info-badge badge-course" id="courseBadge">コース未選択</span>
          <span class="info-badge badge-version" id="versionBadge">--</span>
        </div>
        <div class="info-title" id="versionLabel">2026年度</div>
      </div>
    </div>

    <!-- Countdown -->
    <div class="info-card countdown-card hidden" id="countdownCard">
      <div class="countdown-number" id="countdownNumber">--</div>
      <div class="countdown-label">次のテストまであと</div>
      <div class="countdown-sub" id="countdownSub">テスト日程を読み込んでいます...</div>
    </div>

    <!-- Progress Summary (TOP) -->
    <div class="info-card" id="topProgressCard">
      <div class="progress-top">
        <span class="label">📝 提出物進捗</span>
        <span class="stat" id="topProgressText">0 / 0</span>
        <div class="progress-bar-wrap">
          <div class="progress-bar-fill" id="topProgressBar" style="width:0%"></div>
        </div>
        <button class="progress-reset-btn" id="resetProgressBtn">リセット</button>
      </div>
    </div>

    <!-- Loading -->
    <div class="loading" id="loading">
      <div class="spinner"></div>
      <p>読み込み中...</p>
    </div>

    <!-- Error -->
    <div class="error-box hidden" id="errorBox">
      <span>⚠️</span>
      <span id="errorMessage"></span>
    </div>

    <!-- Schedule -->
    <div class="info-card" id="scheduleCard">
      <div style="display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:8px; margin-bottom:12px;">
        <span style="font-size:1rem; font-weight:700; color:var(--text-secondary);">📅 テスト時間割・範囲</span>
        <div style="display:flex; align-items:center; gap:8px;">
          <button class="calendar-export-btn" id="calendarExportBtn">📅 .ics エクスポート</button>
          <span style="font-size:0.75rem; color:var(--gray-400);" id="lastUpdated"></span>
        </div>
      </div>
      <div class="subj-progress-grid" id="subjectProgressContainer" style="margin-bottom:16px;"></div>
      <div class="schedule-wrapper">
        <table class="schedule-table" id="scheduleTable">
          <thead>
            <tr>
              <th>教科</th>
              <th>日程</th>
              <th>時限</th>
              <th>範囲</th>
              <th>備考</th>
              <th style="text-align:center; width:48px;">✓</th>
            </tr>
          </thead>
          <tbody id="scheduleBody"></tbody>
        </table>
      </div>
      <div class="empty-state hidden" id="emptyState">
        <div class="empty-icon">📭</div>
        <p>スケジュールデータがありません</p>
      </div>
    </div>

  </main>

  <!-- Course Selection Modal -->
  <div class="modal-overlay" id="courseModal">
    <div class="modal-card">
      <div class="modal-title">コースを選択してください</div>
      <div class="modal-subtitle">テスト範囲表の表示内容が変わります</div>
      <div class="course-grid" id="courseGrid">
        <button class="course-btn" data-course="K/文系">
          K/文系
          <span class="course-sub">基本教科 + 歴史</span>
        </button>
        <button class="course-btn" data-course="K/理系（物理）">
          K/理系（物理）
          <span class="course-sub">基本教科 + 地理 + 物理</span>
        </button>
        <button class="course-btn" data-course="K/理系（生物）">
          K/理系（生物）
          <span class="course-sub">基本教科 + 地理 + 生物</span>
        </button>
        <button class="course-btn" data-course="SS/理系（物理）">
          SS/理系（物理）
          <span class="course-sub">基本教科 + 地理 + 物理</span>
        </button>
        <button class="course-btn" data-course="SS/理系（生物）">
          SS/理系（生物）
          <span class="course-sub">基本教科 + 地理 + 生物</span>
        </button>
      </div>
    </div>
  </div>

  <!-- Timer Modal -->
  <div class="modal-overlay hidden" id="timerModal">
    <div class="modal-card timer-modal-card">
      <div class="timer-modal-header">
        <div class="timer-title">⏱ 勉強タイマー</div>
        <div class="timer-modal-actions">
          <button class="menu-btn" id="timerFullscreenBtn" title="全画面">⛶</button>
          <button class="menu-btn" id="timerCloseBtn">✕</button>
        </div>
      </div>
      <div class="timer-controls">
        <select class="form-select timer-subject-select" id="timerSubject" style="width:auto; min-width:140px;">
          <option value="">教科を選択</option>
        </select>
        <div class="timer-duration-controls">
          <label class="duration-label">集中</label>
          <input type="number" class="form-input duration-input" id="timerFocusMin" value="25" min="1" max="120">
          <span class="duration-unit">分</span>
          <label class="duration-label">休憩</label>
          <input type="number" class="form-input duration-input" id="timerBreakMin" value="5" min="1" max="30">
          <span class="duration-unit">分</span>
        </div>
      </div>
      <div class="timer-display-area">
        <div class="timer-progress-ring focus" id="timerRing">
          <svg width="180" height="180" viewBox="0 0 180 180">
            <circle class="bg-circle" cx="90" cy="90" r="78"/>
            <circle class="fg-circle" cx="90" cy="90" r="78"
              stroke-dasharray="490.09" stroke-dashoffset="0"
              id="timerProgressCircle"/>
          </svg>
        </div>
        <div class="timer-display" id="timerDisplay">25:00</div>
        <div class="timer-mode-label" id="timerModeLabel">📚 集中</div>
      </div>
      <div class="timer-actions">
        <button class="btn btn-success btn-sm" id="timerToggleBtn">▶ 開始</button>
        <button class="btn btn-outline btn-sm" id="timerResetBtn">↺ リセット</button>
      </div>
      <div class="timer-stats" id="timerStats">
        <div class="timer-stats-title">今日の勉強時間</div>
        <div class="timer-empty">まだ記録がありません</div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
