<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>変更点を提案 - テスト範囲表</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="https://drive.google.com/thumbnail?id=1Gm9vT1ndaRkRFun0H5ZPmsCFuuTPlyK8&sz=w180">
  <link rel="icon" href="https://drive.google.com/thumbnail?id=1Gm9vT1ndaRkRFun0H5ZPmsCFuuTPlyK8&sz=w32">
  <meta name="theme-color" content="#4f8cff">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="範囲表">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div class="header-inner">
      <div class="header-title">
        <span class="icon">💡</span>
        変更点を提案
      </div>
      <div style="display:flex; align-items:center; gap:4px;">
        <div class="account-container" id="accountContainer"></div>
        <a class="menu-btn" href="https://script.google.com/macros/s/AKfycbwWNG4xKO6yGTWTz2Z9oxdOOkGfHsfia7ItUdvAXPSqwe_tlbrhVTgPgXA_64bmFfG1FA/exec?page=index" aria-label="トップ" title="トップに戻る" style="text-decoration:none; font-size:0.85rem; color:var(--gray-500); padding:6px 10px;">
          📋 トップ
        </a>
        <button class="menu-btn" id="backBtn" aria-label="戻る">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 12H5M12 19l-7-7 7-7"/>
        </svg>
      </button>
      </div>
    </div>
  </header>

  <!-- Main -->
  <main class="container">

    <div class="suggest-card">
      <h2>テスト範囲表の修正・追加を提案</h2>
      <p class="desc">範囲表に誤りがあった場合や、追加したい情報がある場合はこちらから提案してください。管理者が確認後、反映されます。</p>

      <div class="error-box hidden" id="errorBox">
        <span>⚠️</span>
        <span id="errorMessage"></span>
      </div>

      <form id="suggestForm" novalidate>

        <!-- 提案の種類 -->
        <div class="form-group">
          <label class="form-label">提案の種類 <span class="required">*</span></label>
          <div style="display:flex; gap:16px; flex-wrap:wrap; margin-top:4px;">
            <label style="display:flex; align-items:center; gap:6px; cursor:pointer; font-size:0.9rem;">
              <input type="radio" name="sugType" value="test_scope" checked>
              📖 テスト範囲の変更
            </label>
            <label style="display:flex; align-items:center; gap:6px; cursor:pointer; font-size:0.9rem;">
              <input type="radio" name="sugType" value="submission">
              📝 提出物の変更
            </label>
          </div>
        </div>

        <!-- 定期テスト選択 -->
        <div class="form-group">
          <label class="form-label" for="sugVersion">対象の定期テスト <span class="required">*</span></label>
          <select class="form-select" id="sugVersion" required>
            <option value="">読み込み中...</option>
          </select>
        </div>

        <div class="form-group">
          <label class="form-label" for="sugCourse">コース <span class="required">*</span></label>
          <select class="form-select" id="sugCourse" required>
            <option value="">選択してください</option>
            <option value="K/文系">K/文系</option>
            <option value="K/理系（物理）">K/理系（物理）</option>
            <option value="K/理系（生物）">K/理系（生物）</option>
            <option value="SS/理系（物理）">SS/理系（物理）</option>
            <option value="SS/理系（生物）">SS/理系（生物）</option>
          </select>
        </div>

        <div class="form-group">
          <label class="form-label" for="sugSubject">教科 <span class="required">*</span></label>
          <select class="form-select" id="sugSubject" required>
            <option value="">先にコースを選択してください</option>
          </select>
        </div>

        <!-- 範囲変更時のみ表示 -->
        <div id="scopeFields">
          <div class="form-group">
            <label class="form-label" for="sugDate">日程</label>
            <input class="form-input" type="text" id="sugDate" placeholder="例: 6/15(月)">
          </div>
          <div class="form-group">
            <label class="form-label" for="sugPeriod">時限</label>
            <input class="form-input" type="text" id="sugPeriod" placeholder="例: 2時間目">
          </div>
          <div class="form-group">
            <label class="form-label" for="sugScope">範囲</label>
            <textarea class="form-textarea" id="sugScope" placeholder="例: 教科書 p.10~45&#10;ワーク p.2~20" rows="3"></textarea>
          </div>
          <div class="form-group">
            <label class="form-label" for="sugNotes">備考</label>
            <textarea class="form-textarea" id="sugNotes" placeholder="テストの形式や注意事項など" rows="2"></textarea>
          </div>
        </div>

        <!-- 提出物変更時のみ表示 -->
        <div id="submissionFields" class="hidden">
          <div class="form-group">
            <label class="form-label" for="sugSubNotes">提出物の詳細 <span class="required">*</span></label>
            <textarea class="form-textarea" id="sugSubNotes" placeholder="提出物の内容、期限など" rows="3" required></textarea>
          </div>
        </div>

        <button type="submit" class="btn btn-primary btn-full" id="submitBtn">
          提案を送信する
        </button>
      </form>

      <div class="loading hidden" id="loading" style="padding:20px 0;">
        <div class="spinner"></div>
        <p>送信中...</p>
      </div>

      <div class="empty-state hidden" id="successState">
        <div class="empty-icon">✅</div>
        <p>提案を送信しました！</p>
        <p style="font-size:0.85rem; color:var(--gray-400); margin-top:8px;">管理者が確認後、反映されます</p>
        <button class="btn btn-outline" style="margin-top:16px;" onclick="location.href='https://script.google.com/macros/s/AKfycbwWNG4xKO6yGTWTz2Z9oxdOOkGfHsfia7ItUdvAXPSqwe_tlbrhVTgPgXA_64bmFfG1FA/exec?page=index'">トップに戻る</button>
        <button class="btn btn-outline" style="margin-top:16px;" onclick="resetSuggestionForm()">別の回答を送信</button>
      </div>
    </div>

  </main>

  <!-- Login Modal -->
  <div class="modal-overlay hidden" id="loginModal">
    <div class="modal-card account-form">
      <div class="modal-title">ログイン</div>
      <div class="modal-subtitle">アカウントにログインしてください</div>
      <div id="loginError" class="account-error hidden"></div>
      <div class="form-group">
        <label class="form-label">メールアドレス</label>
        <input class="form-input" type="email" id="loginEmail" placeholder="example@mail.com" autocomplete="username">
      </div>
      <div class="form-group">
        <label class="form-label">パスワード</label>
        <input class="form-input" type="password" id="loginPassword" placeholder="パスワード" autocomplete="current-password">
      </div>
      <div class="checkbox-row">
        <input type="checkbox" id="loginAuto">
        <label for="loginAuto">自動ログインする</label>
      </div>
      <button class="btn btn-primary btn-full" id="loginSubmitBtn">ログイン</button>
      <div class="account-forgot-link">パスワードを忘れた場合は管理者にお問い合わせください</div>
      <div class="account-switch">
        アカウントをお持ちでない方は <a id="loginToRegister">新規登録</a>
      </div>
    </div>
  </div>

  <!-- Register Modal -->
  <div class="modal-overlay hidden" id="registerModal">
    <div class="modal-card account-form">
      <div class="modal-title">新規登録</div>
      <div class="modal-subtitle">アカウントを作成してください</div>
      <div id="regError" class="account-error hidden"></div>
      <div class="form-group">
        <label class="form-label">表示名</label>
        <input class="form-input" type="text" id="regDisplayName" placeholder="表示名" autocomplete="name">
      </div>
      <div class="form-group">
        <label class="form-label">メールアドレス</label>
        <input class="form-input" type="email" id="regEmail" placeholder="example@mail.com" autocomplete="username">
      </div>
      <div class="form-group">
        <label class="form-label">パスワード <span class="required">*</span></label>
        <input class="form-input" type="password" id="regPassword" placeholder="8文字以上" autocomplete="new-password">
        <div class="form-hint">8文字以上で入力してください</div>
      </div>
      <button class="btn btn-primary btn-full" id="regSubmitBtn">登録</button>
      <div class="account-switch">
        すでにアカウントをお持ちの方は <a id="registerToLogin">ログイン</a>
      </div>
    </div>
  </div>

  <script src="suggest.js"></script>
</body>
</html>
